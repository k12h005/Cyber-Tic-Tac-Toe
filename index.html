<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cyber Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 class="title">CYBER TIC TAC TOE</h1>

    <div class="mode-select">
      <button id="pvpBtn" class="mode-btn active">Player vs Player</button>
      <button id="aiBtn" class="mode-btn">Player vs AI</button>
    </div>

    <div class="scoreboard">
      <div>X Wins: <span id="xScore">0</span></div>
      <div>O Wins: <span id="oScore">0</span></div>
      <div>Draws: <span id="drawScore">0</span></div>
    </div>

    <div id="status" class="status">Player X's Turn</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button id="restartBtn" class="restart-btn">Restart Game</button>

  </div>

  <script src="game.js"></script>
</body>
</html>
